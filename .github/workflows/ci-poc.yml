name: Catalog.API CI (POC)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Setup Java (required by SonarCloud scanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build, test with coverage, and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"kapilch80-arch_eShop" \
            /o:"kapilch80-arch" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="**/TestResults/*.cobertura.xml"

          dotnet build src/Catalog.API/Catalog.API.csproj -c Release

          # GetCatalogItemsRespectsPageSize assumes AddCatalogItem tests already ran and
          # seeded an exact item count; that ordering isn't guaranteed under the xUnit v3/MTP
          # runner, so it fails independently of any real regression. Excluded until upstream
          # decouples it from execution order.
          dotnet test tests/Catalog.FunctionalTests/Catalog.FunctionalTests.csproj \
            --coverage --coverage-output-format cobertura \
            -- --filter-not-method "*GetCatalogItemsRespectsPageSize*"

          dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  docker-build-push:
    needs: build-test-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image (local only, not pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Catalog.API/Dockerfile
          push: false
          load: true
          tags: |
            ghcr.io/kapilch80-arch/eshop-catalog-api:${{ github.sha }}
            ghcr.io/kapilch80-arch/eshop-catalog-api:latest

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/kapilch80-arch/eshop-catalog-api:${{ github.sha }}
          format: cyclonedx
          output: sbom.cyclonedx.json
          exit-code: '0'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-catalog-api-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90

      - name: Scan image with Trivy (report to GitHub Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/kapilch80-arch/eshop-catalog-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Scan image with Trivy (fail build on fixable Critical/High)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/kapilch80-arch/eshop-catalog-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Catalog.API image
        run: |
          docker push ghcr.io/kapilch80-arch/eshop-catalog-api:${{ github.sha }}
          docker push ghcr.io/kapilch80-arch/eshop-catalog-api:latest
